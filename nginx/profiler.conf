# Zusatz fuer den bestehenden Mainsail-Nginx-Serverblock.
# Die Moonraker-Proxy-Pfade /websocket, /printer/ und /server/ werden
# dabei nicht neu definiert, sondern aus der vorhandenen Mainsail-Konfiguration
# weiterverwendet.

location = /klipper-analyzer {
    return 301 /klipper-analyzer/;
}

location /klipper-analyzer/ {
    alias /home/pi/klipper-analyzer/;
    index index.html;
    try_files $uri $uri/ /klipper-analyzer/index.html;
}
